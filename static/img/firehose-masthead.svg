<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">Red firehose spraying water</title>
  <desc id="desc">A bright red firehose nozzle points right and sprays blue arcs of water.</desc>
  <defs>
    <linearGradient id="hose" x1="0" x2="1">
      <stop offset="0" stop-color="#7f1d1d"/>
      <stop offset="0.45" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="640" height="220" fill="none"/>

  <g filter="url(#shadow)">
    <path d="M28 145 C95 98, 170 92, 248 128 C285 145, 320 151, 356 134" fill="none" stroke="url(#hose)" stroke-width="58" stroke-linecap="round"/>
    <path d="M28 145 C95 98, 170 92, 248 128 C285 145, 320 151, 356 134" fill="none" stroke="#fecaca" stroke-width="10" stroke-linecap="round" opacity="0.45"/>
    <rect x="333" y="99" width="76" height="70" rx="14" fill="url(#metal)" stroke="#334155" stroke-width="6"/>
    <rect x="386" y="86" width="70" height="96" rx="18" fill="#dc2626" stroke="#7f1d1d" stroke-width="7"/>
    <rect x="438" y="104" width="76" height="60" rx="12" fill="url(#metal)" stroke="#334155" stroke-width="6"/>
    <path d="M505 116 L566 94 L566 174 L505 152 Z" fill="#cbd5e1" stroke="#334155" stroke-width="7" stroke-linejoin="round"/>
  </g>

  <g fill="none" stroke-linecap="round">
    <path d="M562 111 C594 92, 613 76, 632 45" stroke="#7dd3fc" stroke-width="9"/>
    <path d="M564 126 C599 118, 618 108, 636 91" stroke="#38bdf8" stroke-width="10"/>
    <path d="M564 140 C600 148, 620 158, 638 180" stroke="#0ea5e9" stroke-width="10"/>
    <path d="M558 155 C587 177, 602 192, 616 214" stroke="#7dd3fc" stroke-width="8"/>
    <path d="M576 126 C598 126, 616 127, 636 130" stroke="#bae6fd" stroke-width="6" opacity="0.9"/>
  </g>

  <g fill="#0284c7" opacity="0.95">
    <circle cx="610" cy="60" r="6"/>
    <circle cx="592" cy="88" r="4"/>
    <circle cx="622" cy="106" r="5"/>
    <circle cx="606" cy="151" r="5"/>
    <circle cx="626" cy="175" r="6"/>
    <circle cx="590" cy="195" r="4"/>
  </g>
</svg>
